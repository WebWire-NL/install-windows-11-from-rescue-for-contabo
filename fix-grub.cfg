set timeout=5
set default=0

menuentry 'Windows Installer (BIOS)' {
    insmod part_msdos
    insmod ntfs
    set root=(hd0,msdos2)
    chainloader +1
    boot
}

menuentry 'Windows 11 (installed)' {
    insmod part_msdos
    insmod ntfs
    set root=(hd0,msdos1)
    makeactive
    chainloader +1
    boot
}
